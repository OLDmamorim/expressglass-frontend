<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
  <title>Portal Comercial - Expressglass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.ico">
  <meta name="theme-color" content="#0f172a">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Figtree', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    .page-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      color: white;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .header-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .header-badge {
      background: rgba(99,179,237,.25);
      border: 1px solid rgba(99,179,237,.4);
      color: #90cdf4;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .portal-selector {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      font-family: 'Figtree', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      min-width: 180px;
    }
    .portal-selector option { background: #1e293b; color: white; }

    .btn-logout {
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-logout:hover { background: rgba(239,68,68,.3); }

    /* ===== MAIN ===== */
    .main { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

    /* ===== TOOLBAR ===== */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
      max-width: 360px;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'Figtree', sans-serif;
      font-size: 14px;
      font-weight: 500;
      background: white;
      transition: border-color .15s;
    }
    .search-input:focus { outline: none; border-color: #3b82f6; }

    .filter-select {
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'Figtree', sans-serif;
      font-size: 14px;
      font-weight: 500;
      background: white;
      cursor: pointer;
    }
    .filter-select:focus { outline: none; border-color: #3b82f6; }

    .summary-chips { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }

    .chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
    }
    .chip-total   { background: #e2e8f0; color: #475569; }
    .chip-done    { background: #dcfce7; color: #16a34a; }
    .chip-notdone { background: #fee2e2; color: #dc2626; }
    .chip-pending { background: #fef3c7; color: #d97706; }

    /* ===== TABLE ===== */
    .table-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 1px 8px rgba(0,0,0,.07);
      overflow: hidden;
    }

    .com-table {
      width: 100%;
      border-collapse: collapse;
    }

    .com-table thead {
      background: #0f172a;
      color: white;
    }
    .com-table thead th {
      padding: 14px 16px;
      text-align: left;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .com-table tbody tr {
      border-bottom: 1px solid #f1f5f9;
      transition: background .1s;
    }
    .com-table tbody tr:hover { background: #f8fafc; }
    .com-table tbody tr.filtered-out { display: none; }

    .com-table td {
      padding: 12px 16px;
      vertical-align: middle;
    }

    /* Coluna matrícula */
    .plate-cell {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .plate-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: white;
      color: #0f172a;
      padding: 5px 12px;
      border-radius: 8px;
      border: 2px solid #1e293b;
    }
    .plate-badge .plate-flag {
      background: #1a56db;
      color: white;
      font-size: 9px;
      font-weight: 800;
      padding: 2px 4px;
      border-radius: 3px;
      letter-spacing: .3px;
    }

    /* Coluna data */
    .date-cell {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      white-space: nowrap;
    }
    .date-cell .date-day {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 500;
      margin-top: 2px;
    }

    /* Coluna estado */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status-pill.done    { background: #dcfce7; color: #16a34a; }
    .status-pill.notdone { background: #fee2e2; color: #dc2626; }
    .status-pill.pending { background: #fef3c7; color: #d97706; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .done .status-dot    { background: #16a34a; }
    .notdone .status-dot { background: #dc2626; }
    .pending .status-dot { background: #d97706; }

    /* Coluna motivo */
    .reason-cell {
      font-size: 13px;
      color: #64748b;
      max-width: 220px;
    }
    .reason-cell.has-reason { color: #dc2626; font-weight: 600; }

    /* Coluna carro */
    .car-cell {
      font-size: 13px;
      font-weight: 600;
      color: #475569;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }
    .empty-state svg { margin-bottom: 16px; opacity: .4; }
    .empty-state p { font-size: 15px; font-weight: 600; }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: #1e293b;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      animation: fadeIn .2s ease;
    }
    .toast.success { border-left: 4px solid #22c55e; }
    .toast.error   { border-left: 4px solid #ef4444; }
    .toast.info    { border-left: 4px solid #3b82f6; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* ===== MOBILE ===== */
    @media (max-width: 640px) {

      /* Header: 2 linhas */
      .page-header {
        flex-direction: column;
        height: auto;
        padding: 12px 16px;
        gap: 10px;
        align-items: stretch;
      }
      .header-left { justify-content: space-between; }
      .header-logo { font-size: 18px; }
      .header-right {
        justify-content: space-between;
        width: 100%;
      }
      .portal-selector {
        flex: 1;
        min-width: 0;
        font-size: 13px;
        padding: 8px 10px;
      }
      .btn-logout { padding: 8px 14px; font-size: 12px; white-space: nowrap; }

      /* Main: menos padding */
      .main { padding: 12px 10px; }

      /* Toolbar: coluna */
      .toolbar {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        margin-bottom: 12px;
      }
      .search-wrap { max-width: 100%; }
      .filter-select { width: 100%; }

      /* Chips: grid 2x2 */
      .summary-chips {
        margin-left: 0;
        display: grid !important;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        width: 100%;
      }
      .chip { justify-content: center; font-size: 12px; padding: 6px 8px; }

      /* Tabela → Cards */
      .table-card { border-radius: 12px; }

      .com-table thead { display: none; }

      .com-table tbody tr {
        display: flex;
        flex-direction: column;
        padding: 14px;
        border-bottom: 2px solid #f1f5f9;
        gap: 8px;
      }

      .com-table td {
        padding: 0;
        display: block;
      }

      /* Linha 1: matrícula + estado lado a lado */
      .com-table td:nth-child(1) { order: 1; }
      .com-table td:nth-child(4) { order: 2; }
      .com-table td:nth-child(3) { order: 3; } /* data */
      .com-table td:nth-child(2) { order: 4; } /* carro */
      .com-table td:nth-child(5) { order: 5; } /* motivo */

      /* Row topo: matrícula + estado */
      .com-table td:nth-child(1),
      .com-table td:nth-child(4) {
        display: inline-block;
        vertical-align: middle;
      }
      .com-table tbody tr { position: relative; flex-direction: row; flex-wrap: wrap; align-items: center; gap: 6px; }
      .com-table td:nth-child(1) { flex: 0 0 auto; }
      .com-table td:nth-child(4) { flex: 0 0 auto; margin-left: auto; }
      .com-table td:nth-child(3) { flex: 0 0 100%; font-size: 13px; color: #64748b; }
      .com-table td:nth-child(2) { flex: 0 0 100%; }
      .com-table td:nth-child(5) { flex: 0 0 100%; }

      .car-cell { font-size: 13px; color: #64748b; }
      .date-cell { font-size: 13px; }
      .date-cell .date-day { display: none; }

      /* Motivo só aparece se tiver conteúdo */
      .reason-cell:not(.has-reason) { display: none !important; }

      .plate-badge { padding: 4px 10px; }
      .plate-cell { font-size: 16px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="page-header">
    <div class="header-left">
      <div class="header-logo">ExpressGlass</div>
      <div class="header-badge">Comercial</div>
    </div>
    <div class="header-right">
      <select id="portalSelect" class="portal-selector" onchange="onPortalChange()">
        <option value="">Selecionar SM...</option>
      </select>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar matrícula..." oninput="filterTable()">
      </div>


      <select id="stateFilter" class="filter-select" onchange="filterTable()">
        <option value="">Todos os estados</option>
        <option value="done">✅ Realizado</option>
        <option value="notdone">❌ Não realizado</option>
        <option value="pending">⏳ Pendente</option>
      </select>
      <div class="summary-chips" id="summaryChips" style="display:none;">
        <div class="chip chip-total"><span id="chipTotal">0</span> total</div>
        <div class="chip chip-done"><span id="chipDone">0</span> realizados</div>
        <div class="chip chip-notdone"><span id="chipNotDone">0</span> não realizados</div>
        <div class="chip chip-pending"><span id="chipPending">0</span> pendentes</div>
      </div>
    </div>

    <div class="table-card">
      <div id="tableWrap">
        <div class="empty-state" id="emptyPortal">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <p>Selecione um SM para ver os serviços</p>
        </div>
        <div class="loading-state" id="loadingState" style="display:none;">
          <div class="spinner"></div>
          <p>A carregar serviços...</p>
        </div>
        <table class="com-table" id="comTable" style="display:none;">
          <thead>
            <tr>
              <th>Matrícula</th>
              <th>Carro</th>
              <th>Data Serviço</th>
              <th>Estado</th>
              <th>Motivo</th>
            </tr>
          </thead>
          <tbody id="comTableBody"></tbody>
        </table>
        <div class="empty-state" id="emptyResults" style="display:none;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <p>Sem resultados para a pesquisa</p>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="auth-client.js"></script>
  <script>
    const API_BASE = '/.netlify/functions';
    let allAppointments = [];
    let currentPortalId = null;

    // ===== AUTH =====
    function getToken() {
      return window.authClient?.getToken?.() || localStorage.getItem('eg_token');
    }

    function getUser() {
      return window.authClient?.getUser?.() || JSON.parse(localStorage.getItem('eg_user') || 'null');
    }

    function doLogout() {
      window.authClient?.logout?.();
      localStorage.removeItem('eg_token');
      localStorage.removeItem('eg_user');
      window.location.href = '/login.html';
    }

    // ===== TOAST =====
    function showToast(msg, type = 'info') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }

    // ===== PORTAIS =====
    async function loadPortals() {
      const user = getUser();
      if (!user) { window.location.href = '/login.html'; return; }

      if (user.role !== 'comercial' && user.role !== 'admin') {
        showToast('Acesso negado', 'error');
        setTimeout(() => window.location.href = '/login.html', 1500);
        return;
      }

      let smPortals = [];

      if (user.role === 'admin') {
        // Admin: buscar todos os portais SM via API
        try {
          const resp = await fetch(`${API_BASE}/portals`, {
            headers: { 'Authorization': 'Bearer ' + getToken() }
          });
          const data = await resp.json();
          smPortals = (data.data || []).filter(p => p.portal_type === 'sm');
        } catch (e) {
          showToast('Erro ao carregar portais', 'error');
          return;
        }
      } else {
        // Comercial: portais vem do token (user.portals), igual ao coordenador
        smPortals = (user.portals || []).filter(p =>
          (p.portalType || p.portal_type) === 'sm'
        );
        if (smPortals.length === 0) {
          showToast('Sem SM atribuidos. Contacte o administrador.', 'error');
          return;
        }
      }

      const sel = document.getElementById('portalSelect');
      smPortals.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name || 'SM ' + p.id;
        sel.appendChild(opt);
      });

      if (smPortals.length === 1) {
        sel.value = smPortals[0].id;
        onPortalChange();
      }
    }

    function onPortalChange() {
      const sel = document.getElementById('portalSelect');
      currentPortalId = sel.value ? parseInt(sel.value) : null;
      if (currentPortalId) loadAppointments();
      else {
        document.getElementById('emptyPortal').style.display = '';
        document.getElementById('comTable').style.display = 'none';
        document.getElementById('summaryChips').style.display = 'none';
        allAppointments = [];
      }
    }

    // ===== CARREGAR AGENDAMENTOS =====
    async function loadAppointments() {
      if (!currentPortalId) return;

      document.getElementById('emptyPortal').style.display = 'none';
      document.getElementById('loadingState').style.display = '';
      document.getElementById('comTable').style.display = 'none';
      document.getElementById('emptyResults').style.display = 'none';

      try {
        const resp = await fetch(`${API_BASE}/appointments?portal_id=${currentPortalId}`, {
          headers: { 'Authorization': 'Bearer ' + getToken() }
        });
        const data = await resp.json();
        allAppointments = data.data || [];
        renderTable();
      } catch (e) {
        showToast('Erro ao carregar serviços', 'error');
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('emptyPortal').style.display = '';
      }
    }

    // ===== ESTADO DE CADA SERVIÇO =====
    function getRowState(a) {
      // Sem data → pendente (não está na agenda)
      if (!a.date) return 'pending';
      // Realizado: técnico marcou explicitamente
      if (a.executed === true) return 'done';
      // Não realizado: só se tiver motivo (técnico escolheu motivo)
      if (a.executed === false && a.not_done_reason) return 'notdone';
      // Tudo o resto (agendado mas não marcado ainda) → pendente
      return 'pending';
    }

    function stateLabel(state) {
      if (state === 'done')    return '<span class="status-pill done"><span class="status-dot"></span>Realizado</span>';
      if (state === 'notdone') return '<span class="status-pill notdone"><span class="status-dot"></span>Não realizado</span>';
      return '<span class="status-pill pending"><span class="status-dot"></span>Pendente</span>';
    }

    function fmtDate(dateStr) {
      if (!dateStr) return '<span style="color:#94a3b8;font-size:13px;">Sem data</span>';
      const clean = String(dateStr).slice(0, 10);
      const d = new Date(clean + 'T00:00:00');
      const day = d.toLocaleDateString('pt-PT', { weekday: 'short' });
      const dm  = d.toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit', year: 'numeric' });
      return `<div class="date-cell">${dm}<div class="date-day">${day}</div></div>`;
    }

    // ===== RENDER =====
    function renderTable() {
      document.getElementById('loadingState').style.display = 'none';

      const tbody = document.getElementById('comTableBody');

      // Todos os serviços: agendados (data desc) + pendentes no fim
      const sorted = [...allAppointments].sort((a, b) => {
        if (!a.date && !b.date) return (a.created_at||'').localeCompare(b.created_at||'');
        if (!a.date) return 1;
        if (!b.date) return -1;
        return new Date(b.date) - new Date(a.date);
      });

      // Contadores
      let total = sorted.length, done = 0, notdone = 0, pending = 0;

      tbody.innerHTML = sorted.map(a => {
        const state = getRowState(a);
        if (state === 'done')    done++;
        else if (state === 'notdone') notdone++;
        else pending++;

        const plate = (a.plate || '').toUpperCase();
        const reason = a.not_done_reason || '';
        const reasonClass = reason ? 'reason-cell has-reason' : 'reason-cell';
        const reasonText = reason || '—';

        return `<tr data-plate="${plate}" data-state="${state}">
          <td>
            <div class="plate-badge">
              <span class="plate-flag">PT</span>
              <span class="plate-cell">${plate}</span>
            </div>
          </td>
          <td class="car-cell">${(a.car || '—').toUpperCase()}</td>
          <td>${fmtDate(a.date)}</td>
          <td>${stateLabel(state)}</td>
          <td class="${reasonClass}">${reasonText}</td>
        </tr>`;
      }).join('');

      // Chips
      document.getElementById('chipTotal').textContent = total;
      document.getElementById('chipDone').textContent = done;
      document.getElementById('chipNotDone').textContent = notdone;
      document.getElementById('chipPending').textContent = pending;
      document.getElementById('summaryChips').style.display = total > 0 ? 'flex' : 'none';

      document.getElementById('comTable').style.display = total > 0 ? '' : 'none';
      document.getElementById('emptyResults').style.display = total === 0 ? '' : 'none';

      filterTable();
    }

    // ===== FILTRO =====
    function filterTable() {
      const search = document.getElementById('searchInput').value.replace(/[^A-Z0-9]/gi, '').toUpperCase();
      const stateF = document.getElementById('stateFilter').value;
      let visible = 0;
      document.querySelectorAll('#comTableBody tr').forEach(tr => {
        const plate = (tr.dataset.plate || '').replace(/[^A-Z0-9]/gi, '').toUpperCase();
        const state = tr.dataset.state || '';
        const matchPlate = !search || plate.includes(search);
        const matchState = !stateF || state === stateF;
        const show = matchPlate && matchState;
        tr.classList.toggle('filtered-out', !show);
        if (show) visible++;
      });
      document.getElementById('emptyResults').style.display =
        visible === 0 && allAppointments.length > 0 ? '' : 'none';
    }

    // ===== BOOT =====
    window.addEventListener('DOMContentLoaded', () => {
      const token = getToken();
      if (!token) { window.location.href = '/login.html'; return; }
      loadPortals();
    });
  </script>
