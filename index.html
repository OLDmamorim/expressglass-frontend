  }
  async function saveR(v){
    try{const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});const d=await r.json();if(d.success)setRank(d.ranking||[]);}catch{}
  }

  const genP=useCallback(async(nv,pu,eu)=>{
    setLoad(true);setPerg(null);setSel(null);setCor(null);setElim([]);setPub(null);
    if(nv%4===3&&eu.length<PEG.length){
      const d=PEG.filter((_,i)=>!eu.includes(i));
      const ix=Math.floor(Math.random()*d.length);
      const pi=PEG.indexOf(d[ix]);
      setEgu(prev=>[...prev,pi]);
      setPerg({q:d[ix].q,o:d[ix].o,c:d[ix].c,e:d[ix].e,eg:true});
      setLoad(false);return;
    }
    const cat=CATS[nv%CATS.length];
    const dif=DIFS[Math.min(nv,DIFS.length-1)];
    const ps=pu.length?"Nao repitas: "+pu.slice(-4).join(" | "):"";
    try{
      const prompt=`Gera UMA pergunta sobre: ${cat}. Dificuldade: ${dif} (nivel ${nv+1} de ${NIVEIS.length}). ${ps} Em Portugues de Portugal. Responde APENAS com JSON valido sem markdown: {"pergunta":"","opcoes":["","","",""],"correta":0,"explicacao":""} - correta e o indice 0-3. Baralha opcoes.`;
      const res=await fetch("/.netlify/functions/joker-questions",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({prompt})
      });
      const dat=await res.json();
      const txt=dat.text||"";
      const obj=JSON.parse(txt.replace(/```json|```/g,"").trim());
      setPerg({q:obj.pergunta,o:obj.opcoes,c:obj.correta,e:obj.explicacao});
    }catch{
      setPerg({q:"Erro ao carregar. Usa Pular.",o:["—","—","—","—"],c:-1,e:""});
    }
    setLoad(false);
  },[]);

  const ini=()=>{
    if(!nome.trim())return;
    setNivel(0);setSeg(null);setMot("");setAj({c:true,p:true,s:true});setPul([]);setEgu([]);
    setFase("jogo");genP(0,[],[]);
  };
  const resp=(i)=>{if(sel!==null||load||elim.includes(i))return;setSel(i);setCor(perg.c);setFase("resposta");};
  const avancar=()=>{
    if(sel===cor){
      if(NIVEIS[nivel].s)setSeg(nivel);
      const nn=nivel+1;
      if(nn>=NIVEIS.length){saveR({nome:nome.trim(),pts:NIVEIS[NIVEIS.length-1].pts,nivel:NIVEIS.length});setMot("ganhou");setFase("fim");return;}
      setNivel(nn);setFase("jogo");genP(nn,pul,egu);
    }else{
      const pts=seg!==null?NIVEIS[seg].pts:0;
      saveR({nome:nome.trim(),pts,nivel});setMot("erro");setFase("fim");
    }
  };
  const desistir=()=>{
    const pts=seg!==null?NIVEIS[seg].pts:nivel>0?NIVEIS[nivel-1].pts:0;
    saveR({nome:nome.trim(),pts,nivel});setMot("desistiu");setFase("fim");
  };
  const u50=()=>{if(!aj.c||!perg||sel!==null)return;setAj(a=>({...a,c:false}));const e=[0,1,2,3].filter(i=>i!==perg.c);setElim(e.sort(()=>Math.random()-.5).slice(0,2));};
  const uPub=()=>{if(!aj.p||!perg||sel!==null)return;setAj(a=>({...a,p:false}));const ce=Math.max(40,80-nivel*4);const v=[0,1,2,3].map(i=>i===perg.c?ce:0);let s=100-ce;[0,1,2,3].filter(i=>i!==perg.c).forEach((i,ix,a)=>{const vv=ix===a.length-1?s:Math.floor(Math.random()*s*0.7);v[i]=vv;s-=vv;});setPub(v);};
  const uPul=()=>{if(!aj.s||!perg||sel!==null)return;setAj(a=>({...a,s:false}));const np=[...pul,perg.q];setPul(np);genP(nivel,np,egu);};

  const ptA=nivel>0?NIVEIS[nivel-1].pts:0;
  const ptS=seg!==null?NIVEIS[seg].pts:0;

  const cO=(i)=>{
    if(elim.includes(i))return{bg:"rgba(5,5,15,0.5)",bd:"rgba(255,255,255,0.05)",tx:"rgba(255,255,255,0.1)"};
    if(fase==="resposta"){
      if(i===cor)return{bg:"rgba(21,128,61,0.82)",bd:"#4ade80",tx:"#bbf7d0"};
      if(i===sel)return{bg:"rgba(127,29,29,0.82)",bd:"#ef4444",tx:"#fecaca"};
      return{bg:"rgba(5,5,15,0.6)",bd:"rgba(255,255,255,0.08)",tx:"rgba(255,255,255,0.3)"};
    }
    if(sel===i)return{bg:"rgba(29,78,216,0.82)",bd:"#3b82f6",tx:"#fff"};
    return{bg:"rgba(15,23,42,0.82)",bd:"rgba(255,255,255,0.14)",tx:"#f1f5f9"};
  };

  if(fase==="entrada")return(
    <div style={{...BS,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
      <div style={{position:"absolute",inset:0,background:OV}}/>
      <div style={{position:"relative",zIndex:1,textAlign:"center",width:"100%",maxWidth:420,padding:"0 24px"}}>
        <div style={{fontSize:12,color:"#f59e0b",letterSpacing:5,fontWeight:700,marginBottom:4}}>EXPRESSGLASS</div>
        <div style={{fontSize:68,fontWeight:900,background:"linear-gradient(135deg,#fbbf24,#d97706)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1,marginBottom:2}}>QUIZ</div>
        <div style={{fontSize:13,color:"#f59e0b",letterSpacing:4,marginBottom:6,fontWeight:700}}>ExpressGlass</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",letterSpacing:2,marginBottom:24}}>EDIÇÃO EXPRESSGLASS</div>
        <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:24,alignItems:"center"}}>
          {[...NIVEIS].reverse().map((n,i)=>{
            const nr=NIVEIS.length-1-i;
            return(<div key={i} style={{width:Math.min(60+i*22,340),background:n.s?"rgba(146,64,14,0.75)":"rgba(15,23,42,0.75)",border:`1px solid ${n.s?"#f59e0b":"rgba(255,255,255,0.12)"}`,borderRadius:4,padding:"3px 10px",display:"flex",justifyContent:"space-between",alignItems:"center",backdropFilter:"blur(4px)"}}>
              <span style={{fontSize:9,color:"rgba(255,255,255,0.35)"}}>{nr+1}</span>
              <span style={{fontSize:10,fontWeight:800,color:n.s?"#fbbf24":"rgba(255,255,255,0.55)"}}>{n.pts.toLocaleString()} serv.</span>
              {n.s&&<span style={{fontSize:9}}>🛡️</span>}
            </div>);
          })}
        </div>
        <input value={nome} onChange={e=>setNome(e.target.value)} onKeyDown={e=>e.key==="Enter"&&ini()}
          placeholder="O teu nome..." autoFocus
          style={{width:"100%",background:"rgba(15,23,42,0.88)",border:"2px solid rgba(251,191,36,0.5)",borderRadius:12,padding:"14px 18px",color:"#f1f5f9",fontSize:16,fontWeight:600,outline:"none",marginBottom:12,boxSizing:"border-box",textAlign:"center",backdropFilter:"blur(8px)"}}/>
        <button onClick={ini} disabled={!nome.trim()}
          style={{width:"100%",background:nome.trim()?"linear-gradient(135deg,#f59e0b,#d97706)":"rgba(30,41,59,0.6)",border:"2px solid rgba(251,191,36,0.35)",borderRadius:50,padding:"15px",fontSize:17,fontWeight:900,color:nome.trim()?"#000":"rgba(255,255,255,0.25)",cursor:nome.trim()?"pointer":"default",letterSpacing:2,marginBottom:12}}>
          ENTRAR NO ESTÚDIO
        </button>
        <button onClick={()=>{setFase("ranking");loadR();}}
          style={{background:"rgba(15,23,42,0.7)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:50,padding:"10px 28px",color:"rgba(255,255,255,0.6)",fontSize:13,fontWeight:600,cursor:"pointer"}}>
          🏆 Ver Ranking
        </button>
      </div>
    </div>
  );

  if(fase==="ranking")return(
    <div style={{...BS,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
      <div style={{position:"absolute",inset:0,background:OV}}/>
      <div style={{position:"relative",zIndex:1,width:"100%",maxWidth:480,padding:"20px 16px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <button onClick={()=>setFase("entrada")} style={{background:"rgba(30,41,59,0.85)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:20,padding:"6px 14px",color:"rgba(255,255,255,0.7)",fontSize:12,cursor:"pointer"}}>← Voltar</button>
          <div style={{fontSize:20,fontWeight:900,color:"#fbbf24"}}>🏆 RANKING GLOBAL</div>
          <button onClick={loadR} style={{background:"rgba(30,41,59,0.85)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:20,padding:"6px 14px",color:"rgba(255,255,255,0.7)",fontSize:12,cursor:"pointer"}}>↻</button>
        </div>
        {rl?<div style={{textAlign:"center",color:"rgba(255,255,255,0.4)",padding:40}}>A carregar...</div>
        :rank.length===0?<div style={{textAlign:"center",color:"rgba(255,255,255,0.4)",padding:40}}>Ainda sem resultados. Sê o primeiro!</div>
        :<div style={{display:"flex",flexDirection:"column",gap:6}}>
          {rank.map((r,i)=>(
            <div key={i} style={{background:i===0?"rgba(146,64,14,0.88)":"rgba(15,23,42,0.88)",border:`1px solid ${i===0?"#f59e0b":"rgba(255,255,255,0.12)"}`,borderRadius:10,padding:"10px 16px",display:"flex",alignItems:"center",gap:12,backdropFilter:"blur(8px)"}}>
              <div style={{fontSize:i<3?22:14,fontWeight:900,color:i===0?"#fbbf24":i===1?"#94a3b8":i===2?"#b45309":"rgba(255,255,255,0.4)",width:28,textAlign:"center"}}>
                {i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>{r.nome}</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>{r.data} · nível {r.nivel}</div>
              </div>
              <div style={{fontSize:16,fontWeight:900,color:i===0?"#fbbf24":"rgba(255,255,255,0.5)"}}>{r.pts.toLocaleString()}</div>
            </div>
          ))}
        </div>}
      </div>
    </div>
  );

  if(fase==="fim"){
    const pts=mot==="ganhou"?NIVEIS[NIVEIS.length-1].pts:mot==="desistiu"?(seg!==null?NIVEIS[seg].pts:nivel>0?NIVEIS[nivel-1].pts:0):ptS;
    return(
      <div style={{...BS,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
        <div style={{position:"absolute",inset:0,background:OV}}/>
        <div style={{position:"relative",zIndex:1,textAlign:"center",padding:"0 24px",maxWidth:400}}>
          <div style={{fontSize:72}}>{mot==="ganhou"?"🏆":mot==="desistiu"?"🎯":"💥"}</div>
          <div style={{fontSize:24,fontWeight:900,color:mot==="ganhou"?"#fbbf24":mot==="desistiu"?"#93c5fd":"#ef4444",marginBottom:4}}>
            {mot==="ganhou"?"VENCESTE!":mot==="desistiu"?"BOA DECISÃO!":"ERRADO!"}
          </div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginBottom:16}}>{nome.trim()}</div>
          {mot==="erro"&&perg&&(
            <div style={{background:"rgba(21,128,61,0.75)",border:"1px solid #4ade80",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#bbf7d0",backdropFilter:"blur(8px)"}}>
              ✅ <strong>{perg.o[perg.c]}</strong>
              {perg.e&&<div style={{fontSize:11,color:"#86efac",marginTop:4}}>{perg.e}</div>}
            </div>
          )}
          <div style={{fontSize:42,fontWeight:900,color:"#fbbf24",marginBottom:4}}>{pts.toLocaleString()}</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginBottom:28}}>serviços</div>
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            <button onClick={()=>{setFase("ranking");loadR();}} style={{background:"rgba(30,58,95,0.85)",border:"1px solid rgba(147,197,253,0.45)",borderRadius:50,padding:"12px 20px",color:"#93c5fd",fontSize:13,fontWeight:700,cursor:"pointer"}}>🏆 Ranking</button>
            <button onClick={()=>setFase("entrada")} style={{background:"linear-gradient(135deg,#f59e0b,#d97706)",border:"none",borderRadius:50,padding:"12px 20px",color:"#000",fontSize:13,fontWeight:700,cursor:"pointer"}}>Jogar de novo</button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{...BS,minHeight:"100vh",height:"100vh",display:"flex",position:"relative",maxWidth:900,margin:"0 auto"}}>
      <div style={{position:"absolute",inset:0,background:OV}}/>
      <div style={{position:"relative",zIndex:1,width:108,padding:"10px 5px 10px 7px",display:"flex",flexDirection:"column",justifyContent:"flex-end",gap:3,background:"rgba(0,0,0,0.38)",borderRight:"1px solid rgba(255,255,255,0.08)",flexShrink:0}}>
        {[...NIVEIS].reverse().map((n,i)=>{
          const nr=NIVEIS.length-1-i,at=nr===nivel,pa=nr<nivel;
          return(<div key={i} style={{background:at?(n.s?"#b45309":"#1d4ed8"):n.s?"rgba(146,64,14,0.4)":pa?"rgba(21,128,61,0.22)":"rgba(15,23,42,0.75)",border:`1px solid ${at?"#fbbf24":n.s?"#92400e":pa?"#166534":"rgba(255,255,255,0.08)"}`,borderRadius:5,padding:"3px 5px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:8,color:at?"#fff":"rgba(255,255,255,0.28)"}}>{nr+1}</span>
            <span style={{fontSize:9,fontWeight:800,color:at?"#fbbf24":n.s?"#f59e0b":pa?"#4ade80":"rgba(255,255,255,0.38)"}}>{n.pts>=1000?(n.pts/1000)+"K":n.pts}</span>
            {n.s&&<span style={{fontSize:8}}>🛡️</span>}
          </div>);
        })}
      </div>
      <div style={{position:"relative",zIndex:1,flex:1,display:"flex",flexDirection:"column",padding:"12px 13px",minWidth:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            <div style={{fontSize:15,fontWeight:900,color:"#fbbf24",letterSpacing:1}}>🃏 Quiz EG</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.38)"}}>{nome.trim()}</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:900,color:"#fbbf24"}}>{ptA.toLocaleString()}</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.38)"}}>serviços</div>
          </div>
          <div style={{display:"flex",gap:5,alignItems:"center"}}>
            <button onClick={()=>{setFase("ranking");loadR();}} style={{background:"rgba(15,23,42,0.75)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:16,padding:"4px 9px",color:"rgba(255,255,255,0.6)",fontSize:10,cursor:"pointer"}}>🏆</button>
            {fase==="jogo"&&nivel>0&&<button onClick={desistir} style={{background:"rgba(15,23,42,0.75)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:16,padding:"4px 9px",color:"rgba(255,255,255,0.6)",fontSize:10,cursor:"pointer"}}>Desistir</button>}
          </div>
        </div>
        {perg?.eg&&!load&&<div style={{background:"rgba(30,58,95,0.88)",border:"1px solid #3b82f6",borderRadius:8,padding:"4px 10px",marginBottom:8,fontSize:10,color:"#93c5fd",fontWeight:700,textAlign:"center"}}>🏢 PERGUNTA EXPRESSGLASS</div>}
        <div style={{background:"rgba(5,10,30,0.88)",border:"2px solid rgba(251,191,36,0.28)",borderRadius:16,padding:16,marginBottom:11,minHeight:88,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(12px)",boxShadow:"0 0 36px rgba(251,191,36,0.12)"}}>
          {load
            ?<div style={{textAlign:"center"}}><div style={{fontSize:26,marginBottom:5}}>⏳</div><div style={{color:"rgba(255,255,255,0.35)",fontSize:12}}>A preparar pergunta...</div></div>
            :<div style={{fontSize:14,fontWeight:700,textAlign:"center",color:"#f1f5f9",lineHeight:1.6}}>{perg?.q}</div>}
        </div>
        {!load&&perg&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:10}}>
            {perg.o.map((op,i)=>{
              const c=cO(i);
              return(<button key={i} onClick={()=>resp(i)} disabled={elim.includes(i)||sel!==null||load}
                style={{background:c.bg,border:`2px solid ${c.bd}`,borderRadius:10,padding:"9px 10px",color:c.tx,fontSize:12,fontWeight:600,cursor:elim.includes(i)||sel!==null?"default":"pointer",display:"flex",alignItems:"center",gap:8,textAlign:"left",backdropFilter:"blur(8px)",opacity:elim.includes(i)?0.25:1}}>
                <span style={{background:"rgba(251,191,36,0.18)",borderRadius:5,padding:"2px 6px",fontSize:10,fontWeight:900,color:"#fbbf24",flexShrink:0}}>{LT[i]}</span>
                <span style={{lineHeight:1.3,flex:1}}>{elim.includes(i)?"":op}</span>
                {pub&&!elim.includes(i)&&<div style={{flexShrink:0,textAlign:"center"}}><div style={{fontSize:11,fontWeight:800,color:"#fbbf24"}}>{pub[i]}%</div><div style={{width:28,height:3,background:"rgba(255,255,255,0.1)",borderRadius:2,marginTop:2}}><div style={{width:`${pub[i]}%`,height:"100%",background:"#fbbf24",borderRadius:2}}/></div></div>}
              </button>);
            })}
          </div>
        )}
        {fase==="resposta"&&perg?.e&&<div style={{background:sel===cor?"rgba(21,128,61,0.75)":"rgba(127,29,29,0.75)",border:`1px solid ${sel===cor?"#166534":"#991b1b"}`,borderRadius:10,padding:"7px 12px",marginBottom:9,fontSize:11,color:sel===cor?"#bbf7d0":"#fecaca",lineHeight:1.5,backdropFilter:"blur(8px)"}}>{perg.e}</div>}
        {fase==="jogo"&&!load&&(
          <div style={{display:"flex",gap:6,marginBottom:10,justifyContent:"center"}}>
            {[{k:"c",l:"50/50",cor:"#3b82f6",fn:u50},{k:"p",l:"👥 Público",cor:"#8b5cf6",fn:uPub},{k:"s",l:"⏭ Pular",cor:"#f59e0b",fn:uPul}].map(a=>(
              <button key={a.k} onClick={a.fn} disabled={!aj[a.k]}
                style={{background:aj[a.k]?"rgba(15,23,42,0.82)":"rgba(5,5,15,0.55)",border:`1px solid ${aj[a.k]?a.cor:"rgba(255,255,255,0.08)"}`,borderRadius:20,padding:"6px 12px",color:aj[a.k]?a.cor:"rgba(255,255,255,0.2)",fontSize:11,fontWeight:700,cursor:aj[a.k]?"pointer":"default"}}>
                {a.l}
              </button>
            ))}
          </div>
        )}
        {fase==="resposta"&&(
          <button onClick={avancar} style={{background:sel===cor?"linear-gradient(135deg,#15803d,#166534)":"linear-gradient(135deg,#991b1b,#7f1d1d)",border:"none",borderRadius:50,padding:13,color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",width:"100%"}}>
            {sel===cor?nivel<NIVEIS.length-1?`Avançar → ${NIVEIS[nivel+1].pts.toLocaleString()} serv.`:"🏆 GANHOU!":`Levei ${ptS.toLocaleString()} serviços`}
          </button>
        )}
        {seg!==null&&fase==="jogo"&&<div style={{textAlign:"center",marginTop:6,fontSize:10,color:"rgba(255,255,255,0.32)"}}>🛡️ Seguro: {ptS.toLocaleString()} serv.</div>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
