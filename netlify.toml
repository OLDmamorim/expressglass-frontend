[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  AWS_LAMBDA_JS_RUNTIME = "nodejs20.x"

[functions]
  node_bundler = "esbuild"

[functions."cleanup-old-data"]
  schedule = "0 3 * * *"

[functions."mycar-gmail-poller"]
  node_bundler = "zisi"

[functions."mycar-poller-cron"]
  node_bundler = "zisi"
  schedule = "*/15 * * * *"
