<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limpeza de Duplicados — ExpressGlass</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 32px 20px; }
    h1 { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .sub { color: #64748b; font-size: 14px; margin-bottom: 28px; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 24px; margin-bottom: 16px; }
    .card h2 { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn { padding: 11px 22px; border: none; border-radius: 9px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all .15s; }
    .btn-scan { background: #334155; color: #e2e8f0; }
    .btn-scan:hover { background: #475569; }
    .btn-delete { background: #be123c; color: #fff; margin-left: 10px; }
    .btn-delete:hover { background: #9f1239; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .stats { display: flex; gap: 16px; margin: 16px 0; flex-wrap: wrap; }
    .stat { background: #0f172a; border-radius: 10px; padding: 12px 18px; flex: 1; min-width: 120px; }
    .stat-n { font-size: 28px; font-weight: 800; color: #f97316; }
    .stat-l { font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }
    .stat-n.green { color: #22c55e; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
    th { background: #0f172a; color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; padding: 8px 10px; text-align: left; }
    td { padding: 9px 10px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 5px; font-size: 11px; font-weight: 700; }
    .badge-keep { background: rgba(34,197,94,.15); color: #22c55e; border: 1px solid rgba(34,197,94,.3); }
    .badge-del { background: rgba(239,68,68,.15); color: #ef4444; border: 1px solid rgba(239,68,68,.3); }
    .result-box { border-radius: 10px; padding: 16px 20px; margin-top: 16px; font-weight: 600; font-size: 15px; }
    .result-ok { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: #4ade80; }
    .result-err { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #f87171; }
    #log { display: none; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<h1>🧹 Limpeza de Duplicados</h1>
<p class="sub">Remove agendamentos duplicados (mesma matrícula, não finalizados). Mantém o mais antigo.</p>

<div class="card">
  <h2>Ações</h2>
  <button class="btn btn-scan" id="btnScan">🔍 Analisar duplicados</button>
  <button class="btn btn-delete" id="btnDelete" disabled>🗑️ Apagar duplicados</button>
</div>

<div class="card" id="log">
  <h2>Resultado da análise</h2>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="statGroups">—</div><div class="stat-l">Grupos duplicados</div></div>
    <div class="stat"><div class="stat-n" id="statDelete">—</div><div class="stat-l">A apagar</div></div>
    <div class="stat"><div class="stat-n green" id="statKeep">—</div><div class="stat-l">A manter</div></div>
  </div>
  <div id="tableWrap"></div>
  <div id="resultBox"></div>
</div>

<script src="auth-client.js"></script>
<script>
  const btnScan   = document.getElementById('btnScan');
  const btnDelete = document.getElementById('btnDelete');
  const log       = document.getElementById('log');

  function token() {
    return window.authClient?.getToken?.() || localStorage.getItem('eg_token') || '';
  }

  async function call(method) {
    const r = await fetch('/.netlify/functions/cleanup-duplicates', {
      method,
      headers: { 'Authorization': 'Bearer ' + token(), 'Content-Type': 'application/json' }
    });
    return r.json();
  }

  btnScan.addEventListener('click', async () => {
    btnScan.innerHTML = '<span class="spinner"></span>A analisar...';
    btnScan.disabled = true;
    btnDelete.disabled = true;
    document.getElementById('resultBox').innerHTML = '';

    try {
      const data = await call('GET');
      log.style.display = 'block';

      if (!data.success) {
        document.getElementById('statGroups').textContent = '!';
        document.getElementById('tableWrap').innerHTML = `<p style="color:#f87171;margin-top:8px;">${data.error}</p>`;
        return;
      }

      document.getElementById('statGroups').textContent = data.duplicateGroups;
      document.getElementById('statDelete').textContent = data.toDelete;
      document.getElementById('statKeep').textContent   = data.duplicateGroups;

      if (data.duplicateGroups === 0) {
        document.getElementById('tableWrap').innerHTML = '<p style="color:#4ade80;margin-top:8px;font-weight:600;">✅ Sem duplicados encontrados!</p>';
        btnDelete.disabled = true;
      } else {
        // Render table
        let html = '<table><thead><tr><th>Portal</th><th>Matrícula</th><th>Total</th><th>Manter (ID)</th><th>Apagar (IDs)</th></tr></thead><tbody>';
        for (const d of data.preview) {
          html += `<tr>
            <td>${d.portal_id}</td>
            <td><strong>${d.plates[0]}</strong></td>
            <td>${d.total}</td>
            <td><span class="badge badge-keep">#${d.keep_id}</span></td>
            <td>${d.delete_ids.map(id => `<span class="badge badge-del">#${id}</span>`).join(' ')}</td>
          </tr>`;
        }
        html += '</tbody></table>';
        document.getElementById('tableWrap').innerHTML = html;
        btnDelete.disabled = false;
      }
    } catch (e) {
      document.getElementById('tableWrap').innerHTML = `<p style="color:#f87171;">Erro: ${e.message}</p>`;
    } finally {
      btnScan.innerHTML = '🔍 Analisar duplicados';
      btnScan.disabled = false;
    }
  });

  btnDelete.addEventListener('click', async () => {
    if (!confirm(`Tens a certeza? Esta ação vai apagar os duplicados permanentemente.`)) return;
    btnDelete.innerHTML = '<span class="spinner"></span>A apagar...';
    btnDelete.disabled = true;

    try {
      const data = await call('POST');
      const box = document.getElementById('resultBox');
      if (data.success) {
        box.className = 'result-box result-ok';
        box.innerHTML = `✅ ${data.deleted} duplicados apagados com sucesso.`;
        document.getElementById('statDelete').textContent = '0';
        btnScan.click(); // re-scan
      } else {
        box.className = 'result-box result-err';
        box.innerHTML = `❌ Erro: ${data.error}`;
        btnDelete.disabled = false;
      }
    } catch (e) {
      document.getElementById('resultBox').className = 'result-box result-err';
      document.getElementById('resultBox').innerHTML = `❌ Erro: ${e.message}`;
      btnDelete.disabled = false;
    } finally {
      btnDelete.innerHTML = '🗑️ Apagar duplicados';
    }
  });

  // Auto-scan se já estiver logado
  window.addEventListener('load', () => setTimeout(() => {
    if (token()) btnScan.click();
  }, 500));
</script>
</body>
</html>
